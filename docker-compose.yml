services:
  web:
    build:
      context: .
      target: runtime
    env_file: .env
    ports:
      - '3000:3000'
    restart: unless-stopped

  worker:
    container_name: worker
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      IMAP_PUBLIC_HOST: 0.0.0.0
      IMAP_PUBLIC_PORT: ${IMAP_PUBLIC_PORT:-993}
    ports:
      - '0.0.0.0:${IMAP_PUBLIC_PORT:-993}:${IMAP_PUBLIC_PORT:-993}'
    restart: unless-stopped
